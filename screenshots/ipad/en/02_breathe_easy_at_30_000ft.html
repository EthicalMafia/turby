<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turby – Breathe Easy at 30,000ft</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    margin: 0;
    padding: 0;
    background: #0A1628;
  }

  .canvas {
    position: relative;
    width: 2048px;
    height: 2732px;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    z-index: 0;
  }

  .headline-wrapper {
    position: absolute;
    top: 0;
    left: 50%;
    width: 76%;
    height: 22%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 20;
  }

  .headline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 120px;
    line-height: 1.15;
    color: #FFFFFF;
    text-shadow:
      0 4px 40px rgba(10, 22, 40, 0.85),
      0 2px 12px rgba(10, 22, 40, 0.9),
      0 0 80px rgba(10, 22, 40, 0.6);
    letter-spacing: -1px;
  }

  .device-wrapper {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 85%;
    transform: translateX(-50%) translateY(6%);
    z-index: 10;
  }

  .device-inner {
    position: relative;
    aspect-ratio: 2245/2930;
  }

  .device-screen {
    position: absolute;
    overflow: hidden;
    left: 4.28%;
    top: 3.48%;
    width: 91.22%;
    height: 93.24%;
    border-radius: 1.4% / 1.0%;
  }

  .device-screen img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .device-frame {
    position: relative;
    z-index: 10;
    display: block;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="canvas">

  <!-- Background -->
  <img
    class="bg"
    src="https://r2-pub.rork.com/app-store-screenshots/19ffb236-9dc4-4d8e-8ff2-01c7dbd0de3a.png"
    draggable="false"
    alt=""
  />

  <!-- Headline -->
  <div class="headline-wrapper">
    <h1 class="headline">Breathe Easy<br>at 30,000ft</h1>
  </div>

  <!-- Device Mockup -->
  <div class="device-wrapper">
    <div class="device-inner">
      <div class="device-screen">
        <img src="https://r2-pub.rork.com/attachments/rw73dgh2c5dxqthncuvxz" draggable="false" alt="App screenshot" />
      </div>
      <img
        class="device-frame"
        src="https://r2-pub.rork.com/static/ipad-mockups/ipad-pro-13-space-gray-portrait.png"
        draggable="false"
        alt=""
      />
    </div>
  </div>

</div>

</body>
</html>
