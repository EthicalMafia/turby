<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; background: #0A1628; }
</style>
</head>
<body>
<div style="position:relative; width:2048px; height:2732px; overflow:hidden;">

  <!-- Background -->
  <img src="https://r2-pub.rork.com/app-store-screenshots/8803e99c-47c1-4aba-bebd-ff44728514fe.png" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block;" draggable="false" />

  <!-- Subtle dark scrim behind headline area for contrast -->
  <div style="position:absolute; top:0; left:0; width:100%; height:26%; background: linear-gradient(to bottom, rgba(8,16,36,0.55) 0%, rgba(8,16,36,0.38) 70%, rgba(8,16,36,0.0) 100%);"></div>

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:76%; height:22%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center;">
    <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 120px; line-height: 1.12; color: #FFFFFF; letter-spacing: -1px; text-shadow: 0px 4px 48px rgba(10,22,40,0.85), 0px 2px 12px rgba(10,22,40,0.7), 0px 0px 80px rgba(14,110,140,0.35);">Know Before<br>You Fly</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:85%; transform:translateX(-50%) translateY(6%);">
    <div style="position:relative; aspect-ratio:2245/2930;">
      <div style="position:absolute; overflow:hidden; left:4.28%; top:3.48%; width:91.22%; height:93.24%; border-radius:1.4% / 1.0%;">
        <img src="https://r2-pub.rork.com/attachments/yrv78w0wr39y1we6m96m2" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/ipad-mockups/ipad-pro-13-space-gray-portrait.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
