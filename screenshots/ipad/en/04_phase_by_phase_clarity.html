<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; background: #000; }
</style>
</head>
<body>
<div style="position:relative; width:2048px; height:2732px; overflow:hidden;">

  <!-- Background -->
  <img src="https://r2-pub.rork.com/app-store-screenshots/4de3da41-4e70-4be4-8ae8-29c4cd8cdaa3.png" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block;" draggable="false" />

  <!-- Dark overlay to ensure headline contrast in upper region -->
  <div style="position:absolute; top:0; left:0; width:100%; height:28%; background: linear-gradient(to bottom, rgba(6,12,28,0.72) 0%, rgba(6,12,28,0.45) 70%, rgba(6,12,28,0.0) 100%);"></div>

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:76%; height:22%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center;">
    <h1 style="font-family:'Plus Jakarta Sans', sans-serif; font-size:120px; font-weight:800; color:#FFFFFF; line-height:1.12; letter-spacing:-1px; text-shadow: 0 4px 40px rgba(0,0,0,0.7), 0 2px 12px rgba(0,0,0,0.6), 0 0 80px rgba(14,110,140,0.35);">Phase by Phase<br>Clarity</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:85%; transform:translateX(-50%) translateY(6%);">
    <div style="position:relative; aspect-ratio:2245/2930;">
      <div style="position:absolute; overflow:hidden; left:4.28%; top:3.48%; width:91.22%; height:93.24%; border-radius:1.4% / 1.0%;">
        <img src="https://r2-pub.rork.com/attachments/q3mm0v8ea23rknuledfqh" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/ipad-mockups/ipad-pro-13-space-gray-portrait.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
